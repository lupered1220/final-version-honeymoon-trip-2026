<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>行程救援系統 - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        body { font-family: -apple-system, sans-serif, 'Noto Serif TC'; background: #FDFBF7; color: #4A4238; }
        .container { background: white; border-radius: 30px 30px 0 0; margin-top: 100px; position: relative; min-height: 100vh; padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .item-card { background: #FCFAF5; border-radius: 16px; padding: 18px; margin-bottom: 12px; border: 1px solid #E8E2D6; border-left: 6px solid #5D5344; }
        .tab-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 10px 0; border-top: 1px solid #EEE; z-index: 100; }
        .debug-panel { background: #333; color: white; padding: 10px; font-size: 10px; position: fixed; top: 0; width: 100%; z-index: 200; overflow-x: auto; white-space: nowrap; }
        .debug-btn { background: #555; padding: 4px 8px; border-radius: 4px; margin-right: 5px; border: 1px solid #777; }
        .debug-btn.active { background: #28C76F; border-color: white; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="debug-panel">
        <span class="mr-2">切換版本：</span>
        <button v-for="id in docList" @click="switchDoc(id)" :class="['debug-btn', currentDoc === id ? 'active' : '']">
            {{ id }}
        </button>
    </div>

    <div class="container">
        <div class="mb-4 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold">行程救援</h1>
                <p class="text-xs text-stone-400">目前位置: {{ currentDoc }}</p>
            </div>
            <div class="text-xs font-bold px-2 py-1 rounded bg-green-100 text-green-700">{{ syncStatus }}</div>
        </div>

        <div class="flex overflow-x-auto gap-2 mb-6 no-scrollbar">
            <div v-for="(day, i) in days" @click="dayIdx = i" :class="['flex-shrink-0 px-4 py-2 rounded-xl border text-center transition-all', dayIdx === i ? 'bg-stone-800 text-white' : 'bg-white']">
                <div class="text-[9px] uppercase">{{ day.weekday }}</div>
                <div class="text-sm font-bold">{{ day.dateNum }}</div>
            </div>
        </div>

        <div v-if="sortedItinerary.length > 0">
            <div v-for="item in sortedItinerary" class="item-card">
                <div class="flex justify-between text-[11px] text-stone-400 mb-1">
                    <span>{{ item.type }}</span>
                    <span>{{ item.time }}</span>
                </div>
                <div class="font-bold text-lg">{{ item.name }}</div>
                <div v-if="item.note" class="text-sm text-stone-500 mt-1">{{ item.note }}</div>
            </div>
        </div>
        <div v-else class="text-center py-20 text-stone-300 italic">
            這個版本下此日期沒有行程<br>請點擊上方黑色列切換其他版本
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const { createApp, ref, computed } = Vue;
    const initialDays = [
        { weekday: '週二', dateNum: '3/10', itinerary: [] }, { weekday: '週三', dateNum: '3/11', itinerary: [] },
        { weekday: '週四', dateNum: '3/12', itinerary: [] }, { weekday: '週五', dateNum: '3/13', itinerary: [] },
        { weekday: '週六', dateNum: '3/14', itinerary: [] }, { weekday: '週日', dateNum: '3/15', itinerary: [] },
        { weekday: '週一', dateNum: '3/16', itinerary: [] }, { weekday: '週二', dateNum: '3/17', itinerary: [] },
        { weekday: '週三', dateNum: '3/18', itinerary: [] }, { weekday: '週四', dateNum: '3/19', itinerary: [] }
    ];

    createApp({
        setup() {
            const days = ref(initialDays);
            const dayIdx = ref(0);
            const currentDoc = ref('final_v2026');
            const syncStatus = ref('連接中...');
            const docList = ['final_v2026', 'v2026_final_stable', 'v2026_FINAL_STABLE'];
            
            let db;
            try {
                firebase.initializeApp({
                    apiKey: "AIzaSyAVJ8v_feOY-ejbxypVDbLl2FG4nqEcIqk",
                    authDomain: "honeymoon-2026-603b1.firebaseapp.com",
                    projectId: "honeymoon-2026-603b1",
                    appId: "1:134468542600:web:551d3d36f0a61c2ae07f3d"
                });
                db = firebase.firestore();
                loadData(currentDoc.value);
            } catch (e) { syncStatus.value = "連線失敗"; }

            function loadData(id) {
                syncStatus.value = "讀取中...";
                db.collection("trips").doc(id).get().then(doc => {
                    if (doc.exists && doc.data().days) {
                        days.value = doc.data().days;
                        syncStatus.value = "讀取成功";
                    } else {
                        syncStatus.value = "此版無資料";
                        days.value = initialDays;
                    }
                });
            }

            const sortedItinerary = computed(() => {
                return (days.value[dayIdx.value]?.itinerary || []).sort((a,b) => a.time.localeCompare(b.time));
            });

            return {
                days, dayIdx, currentDoc, syncStatus, docList, sortedItinerary,
                switchDoc: (id) => { currentDoc.value = id; loadData(id); }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
